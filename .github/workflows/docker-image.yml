name: Build Media Converter

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        # We just added 'latest' to this array!
        hardware: [cpu, intel, amd, latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Passes 'latest' (or cpu/intel/amd) into the Dockerfile
          build-args: |
            HW_TYPE=${{ matrix.hardware }}
          # Automatically creates the :latest tag!
          tags: ghcr.io/blhackslash/media-converter:${{ matrix.hardware }}
